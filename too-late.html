<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Too Late</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg,#000,#0a0a0a);
  color:white;
  text-align:center;
}

.container{
  padding:60px 20px;
  max-width:520px;
  margin:auto;
}

.profile{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #ffcc00;
  box-shadow:0 0 25px #ffcc00;
  margin-bottom:20px;
}

h1{
  font-size:30px;
  margin-bottom:14px;
  line-height:1.3;
}

.sub{
  color:#ccc;
  font-size:16px;
  margin-bottom:20px;
  line-height:1.5;
}

.warn{
  color:#ffcc00;
  font-weight:bold;
  margin-bottom:20px;
}

.cta{
  color:#ffcc00;
  font-size:13px;
  margin-bottom:10px;
}

.button{
  display:inline-block;
  background:#ffcc00;
  color:black;
  padding:18px 35px;
  border-radius:50px;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 0 30px #ffcc00;
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

.proof{
  margin-top:20px;
  font-size:14px;
  color:#aaa;
}

.extra{
  margin-top:20px;
  font-size:14px;
  color:#bbb;
  line-height:1.5;
}
</style>
</head>

<body>

<div class="container">

<img src="https://images.unsplash.com/photo-1531123897727-8f129e1688ce" class="profile">

<h1>Don’t realize this too late.</h1>

<p class="sub">
You saw the signs…  
you felt the distance…  

but you kept hoping it would change.
</p>

<p class="warn">⚠️ Most people regret waiting</p>

<p class="cta">👇 Watch this now</p>

<a href="https://newsco.eu.org/TsSWkhxLWtxXRCZf" class="button">
👉 See the truth before it’s too late
</a>

<p class="proof">
28,901 people understood this today
</p>

<p class="extra">
The hardest truth…  
is the one you already know.
</p>

</div>

</body>
</html>
