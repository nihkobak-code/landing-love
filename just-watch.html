<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just Watch</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: Arial, sans-serif;
  background:#000;
  color:white;
  text-align:center;
}

.container{
  padding:60px 20px;
  max-width:520px;
  margin:auto;
}

.profile{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #00ff88;
  box-shadow:0 0 25px #00ff88;
  margin-bottom:20px;
}

h1{
  font-size:30px;
  margin-bottom:14px;
}

.sub{
  color:#ccc;
  font-size:16px;
  margin-bottom:20px;
  line-height:1.5;
}

.cta{
  color:#00ff88;
  font-size:13px;
  margin-bottom:10px;
}

.button{
  display:inline-block;
  background:#00ff88;
  color:black;
  padding:18px 35px;
  border-radius:50px;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 0 30px #00ff88;
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

.proof{
  margin-top:20px;
  font-size:14px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7" class="profile">

<h1>Just watch this.</h1>

<p class="sub">
No overthinking.  
No guessing.  

Just see it for yourself.
</p>

<p class="cta">👇 It only takes a few seconds</p>

<a href="https://godate.my.id/X7h6EjP2ZDlneejV" class="button">
👉 Watch now
</a>

<p class="proof">
42,508 people watched this today
</p>

</div>

</body>
</html>
