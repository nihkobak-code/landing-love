<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wake Up</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: Arial, sans-serif;
  background:#000;
  color:white;
  text-align:center;
}

.container{
  padding:60px 20px;
  max-width:520px;
  margin:auto;
}

.profile{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #ff0000;
  box-shadow:0 0 25px #ff0000;
  margin-bottom:20px;
}

h1{
  font-size:32px;
  margin-bottom:14px;
  line-height:1.3;
}

.sub{
  color:#ccc;
  font-size:16px;
  margin-bottom:20px;
  line-height:1.6;
}

.warn{
  color:#ff0000;
  font-weight:bold;
  margin-bottom:20px;
}

.cta{
  color:#ff0000;
  font-size:13px;
  margin-bottom:10px;
}

.button{
  display:inline-block;
  background:#ff0000;
  color:white;
  padding:18px 35px;
  border-radius:50px;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 0 30px #ff0000;
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.06);}
  100%{transform:scale(1);}
}

.proof{
  margin-top:20px;
  font-size:14px;
  color:#888;
}

.extra{
  margin-top:20px;
  font-size:14px;
  color:#aaa;
  line-height:1.5;
}
</style>
</head>

<body>

<div class="container">

<img src="https://images.unsplash.com/photo-1506863530036-1efeddceb993" class="profile">

<h1>Wake up.</h1>

<p class="sub">
They’re not confused.  
They’re not busy.  

They just don’t care the way you do.
</p>

<p class="warn">⚠️ This is the truth you avoid</p>

<p class="cta">👇 Watch this</p>

<a href="https://newsco.eu.org/kFTotzgbtG8oSvME" class="button">
👉 See what you’ve been denying
</a>

<p class="proof">
31,204 people faced this today
</p>

<p class="extra">
The more you ignore it…  
the more it hurts later.
</p>

</div>

</body>
</html>
