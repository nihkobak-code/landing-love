<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Not Worth It</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: Arial, sans-serif;
  background:#000;
  color:white;
  text-align:center;
}

.container{
  padding:60px 20px;
  max-width:520px;
  margin:auto;
}

.profile{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #ff6600;
  box-shadow:0 0 25px #ff6600;
  margin-bottom:20px;
}

h1{
  font-size:30px;
  margin-bottom:14px;
  line-height:1.3;
}

.sub{
  color:#ccc;
  font-size:16px;
  margin-bottom:20px;
  line-height:1.6;
}

.warn{
  color:#ff6600;
  font-weight:bold;
  margin-bottom:20px;
}

.cta{
  color:#ff6600;
  font-size:13px;
  margin-bottom:10px;
}

.button{
  display:inline-block;
  background:#ff6600;
  color:white;
  padding:18px 35px;
  border-radius:50px;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 0 30px #ff6600;
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

.proof{
  margin-top:20px;
  font-size:14px;
  color:#aaa;
}

.extra{
  margin-top:20px;
  font-size:14px;
  color:#bbb;
  line-height:1.5;
}
</style>
</head>

<body>

<div class="container">

<img src="https://images.unsplash.com/photo-1517841905240-472988babdf9" class="profile">

<h1>This isn’t love.</h1>

<p class="sub">
You keep giving…  
they keep taking.  

You keep waiting…  
they keep ignoring.
</p>

<p class="warn">⚠️ It was never balanced</p>

<p class="cta">👇 You need to see this</p>

<a href="https://newsco.eu.org/PZGrjOXfa3hD9RsR" class="button">
👉 See what’s really happening
</a>

<p class="proof">
34,112 people realized this today
</p>

<p class="extra">
Love doesn’t feel like confusion.  
That’s your answer.
</p>

</div>

</body>
</html>
