<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Something Off</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: Arial, sans-serif;
  background:#000;
  color:white;
  text-align:center;
}

.container{
  padding:60px 20px;
  max-width:520px;
  margin:auto;
}

.profile{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #aa00ff;
  box-shadow:0 0 25px #aa00ff;
  margin-bottom:20px;
}

h1{
  font-size:30px;
  margin-bottom:14px;
  line-height:1.3;
}

.sub{
  color:#ccc;
  font-size:16px;
  margin-bottom:20px;
  line-height:1.6;
}

.warn{
  color:#aa00ff;
  font-weight:bold;
  margin-bottom:20px;
}

.cta{
  color:#aa00ff;
  font-size:13px;
  margin-bottom:10px;
}

.button{
  display:inline-block;
  background:#aa00ff;
  color:white;
  padding:18px 35px;
  border-radius:50px;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 0 30px #aa00ff;
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

.proof{
  margin-top:20px;
  font-size:14px;
  color:#aaa;
}

.extra{
  margin-top:20px;
  font-size:14px;
  color:#bbb;
  line-height:1.5;
}
</style>
</head>

<body>

<div class="container">

<img src="https://images.unsplash.com/photo-1487412912498-0447578fcca8" class="profile">

<h1>Something feels off.</h1>

<p class="sub">
They act different…  
they reply slower…  

and suddenly…  
you’re the only one trying.
</p>

<p class="warn">⚠️ Trust your gut</p>

<p class="cta">👇 You need to see this</p>

<a href="https://datinglive.my.id/aFUh8ocPigdbP9ZE" class="button">
👉 Find out what’s really going on
</a>

<p class="proof">
39,221 people noticed this today
</p>

<p class="extra">
That feeling?  
It’s not random.
</p>

</div>

</body>
</html>
