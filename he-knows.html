<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>He Knows</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top,#0f0f0f,#000);
  color:white;
  text-align:center;
}

.container{
  padding:60px 20px;
  max-width:520px;
  margin:auto;
}

.profile{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #ff4d8d;
  box-shadow:0 0 25px #ff4d8d;
  margin-bottom:20px;
}

h1{
  font-size:30px;
  margin-bottom:14px;
  line-height:1.3;
}

.sub{
  color:#ccc;
  font-size:16px;
  margin-bottom:20px;
  line-height:1.5;
}

.warn{
  color:#ff3b3b;
  font-weight:bold;
  margin-bottom:20px;
}

.cta{
  color:#ff4d8d;
  font-size:13px;
  margin-bottom:10px;
}

.button{
  display:inline-block;
  background:#ff4d8d;
  color:white;
  padding:18px 35px;
  border-radius:50px;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 0 30px #ff4d8d;
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

.proof{
  margin-top:20px;
  font-size:14px;
  color:#aaa;
}

.extra{
  margin-top:20px;
  font-size:14px;
  color:#bbb;
  line-height:1.5;
}
</style>
</head>

<body>

<div class="container">

<img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2" class="profile">

<h1>He already knows.</h1>

<p class="sub">
He knows what you want.  
He knows how you feel.  

He just doesn’t choose you.
</p>

<p class="warn">⚠️ This is what you keep avoiding</p>

<p class="cta">👇 Don’t ignore this</p>

<a href="https://newsco.eu.org/RpPGKCkqOnGRT9nw" class="button">
👉 Watch before it’s too late
</a>

<p class="proof">
21,847 people realized this today
</p>

<p class="extra">
If he really wanted you…  
you wouldn’t feel confused.
</p>

</div>

</body>
</html>
