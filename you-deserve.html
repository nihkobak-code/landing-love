<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You Deserve Better</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg,#000,#0a0a0a);
  color:white;
  text-align:center;
}

.container{
  padding:60px 20px;
  max-width:520px;
  margin:auto;
}

.profile{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #00ff88;
  box-shadow:0 0 25px #00ff88;
  margin-bottom:20px;
}

h1{
  font-size:30px;
  margin-bottom:14px;
  line-height:1.3;
}

.sub{
  color:#ccc;
  font-size:16px;
  margin-bottom:20px;
  line-height:1.5;
}

.warn{
  color:#00ff88;
  font-weight:bold;
  margin-bottom:20px;
}

.cta{
  color:#00ff88;
  font-size:13px;
  margin-bottom:10px;
}

.button{
  display:inline-block;
  background:#00ff88;
  color:black;
  padding:18px 35px;
  border-radius:50px;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 0 30px #00ff88;
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

.proof{
  margin-top:20px;
  font-size:14px;
  color:#aaa;
}

.extra{
  margin-top:20px;
  font-size:14px;
  color:#bbb;
  line-height:1.5;
}
</style>
</head>

<body>

<div class="container">

<img src="https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91" class="profile">

<h1>You deserve better.</h1>

<p class="sub">
You kept giving your time, your energy…  
your attention.  

But deep down…  
you already knew.
</p>

<p class="warn">⚠️ Stop ignoring how you feel</p>

<p class="cta">👇 This will hit you</p>

<a href="https://cozydate.my.id/697c5bFIco7Nwras" class="button">
👉 See what you’ve been avoiding
</a>

<p class="proof">
24,193 people felt this today
</p>

<p class="extra">
You’re not asking for too much.  
You’re just asking the wrong person.
</p>

</div>

</body>
</html>
