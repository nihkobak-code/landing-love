<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reality Check</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg,#000,#0a0a0a);
  color:white;
  text-align:center;
}

.container{
  padding:60px 20px;
  max-width:500px;
  margin:auto;
}

img.profile{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #00ff88;
  box-shadow:0 0 25px #00ff88;
  margin-bottom:20px;
}

h1{
  font-size:30px;
  margin-bottom:15px;
  line-height:1.3;
}

.sub{
  color:#bbb;
  margin-bottom:20px;
  font-size:16px;
}

.warning{
  color:#ff3b3b;
  font-weight:bold;
  margin-bottom:20px;
}

.button{
  display:inline-block;
  background:#00ff88;
  color:black;
  padding:18px 35px;
  border-radius:50px;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 0 30px #00ff88;
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

.proof{
  margin-top:25px;
  font-size:14px;
  color:#888;
}

.extra{
  margin-top:20px;
  font-size:14px;
  color:#aaa;
}

</style>
</head>

<body>

<div class="container">

<img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2" class="profile">

<h1>You're not the only one.</h1>

<p class="sub">
He gives you just enough attention  
so you don’t leave…  
but never enough to feel secure.
</p>

<p class="warning">
⚠️ If this feels familiar… don’t ignore it
</p>

<a href="https://endeel1.eu.org/hwxLEVOVjIZBuXdH" class="button">
👉 Watch what you’ve been avoiding
</a>

<p class="proof">
17,000+ people realized this today
</p>

<p class="extra">
If he really wanted you…  
you wouldn’t feel confused.
</p>

</div>

</body>
</html>
