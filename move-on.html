<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Move On</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg,#000,#111);
  color:white;
  text-align:center;
}

.container{
  padding:60px 20px;
  max-width:520px;
  margin:auto;
}

.profile{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #00ccff;
  box-shadow:0 0 25px #00ccff;
  margin-bottom:20px;
}

h1{
  font-size:30px;
  margin-bottom:14px;
  line-height:1.3;
}

.sub{
  color:#ccc;
  font-size:16px;
  margin-bottom:20px;
  line-height:1.6;
}

.warn{
  color:#00ccff;
  font-weight:bold;
  margin-bottom:20px;
}

.cta{
  color:#00ccff;
  font-size:13px;
  margin-bottom:10px;
}

.button{
  display:inline-block;
  background:#00ccff;
  color:black;
  padding:18px 35px;
  border-radius:50px;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 0 30px #00ccff;
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

.proof{
  margin-top:20px;
  font-size:14px;
  color:#aaa;
}

.extra{
  margin-top:20px;
  font-size:14px;
  color:#bbb;
  line-height:1.5;
}
</style>
</head>

<body>

<div class="container">

<img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1" class="profile">

<h1>It’s time to let go.</h1>

<p class="sub">
You’ve been holding on…  
hoping things would change.  

But deep down…  
you already know they won’t.
</p>

<p class="warn">⚠️ You deserve peace</p>

<p class="cta">👇 This might change everything</p>

<a href="https://cozydate.my.id/TjQNr8zidgCngLKK" class="button">
👉 See what you need to see
</a>

<p class="proof">
36,908 people chose themselves today
</p>

<p class="extra">
Letting go hurts…  
but staying hurts more.
</p>

</div>

</body>
</html>
